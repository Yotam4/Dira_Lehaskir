version: "3.9"

services:
  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dirascan}
      POSTGRES_USER: ${POSTGRES_USER:-dirascan}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dirascan_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dirascan}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-dirascan}:${POSTGRES_PASSWORD:-dirascan_dev}@db:5432/${POSTGRES_DB:-dirascan}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
      - ./scraper:/scraper  # api imports dirascan package from mounted volume
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  scraper:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-dirascan}:${POSTGRES_PASSWORD:-dirascan_dev}@db:5432/${POSTGRES_DB:-dirascan}
      PLAYWRIGHT_HEADLESS: ${PLAYWRIGHT_HEADLESS:-true}
      SCRAPER_REQUEST_DELAY_SECONDS: ${SCRAPER_REQUEST_DELAY_SECONDS:-2.0}
      FACEBOOK_EMAIL: ${FACEBOOK_EMAIL:-}
      FACEBOOK_PASSWORD: ${FACEBOOK_PASSWORD:-}
    env_file:
      - .env
    volumes:
      - ./scraper:/app
      - playwright_cache:/ms-playwright
    depends_on:
      db:
        condition: service_healthy
    # No default command — run on-demand:
    #   docker compose run --rm scraper dirascan scrape --city "תל אביב" --source yad2
    profiles:
      - scraper

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      VITE_MAPBOX_TOKEN: ${VITE_MAPBOX_TOKEN:-}

volumes:
  pgdata:
  playwright_cache:
