version: "3.9"

services:
  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dirascan}
      POSTGRES_USER: ${POSTGRES_USER:-dirascan}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dirascan_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dirascan}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: applies Alembic migrations, then exits. The api and scraper
  # services wait for this to complete successfully before starting.
  migrate:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-dirascan}:${POSTGRES_PASSWORD:-dirascan_dev}@db:5432/${POSTGRES_DB:-dirascan}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    command: dirascan migrate
    restart: "no"

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-dirascan}:${POSTGRES_PASSWORD:-dirascan_dev}@db:5432/${POSTGRES_DB:-dirascan}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
      - ./scraper:/scraper  # api imports dirascan package from mounted volume
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    command: uvicorn main:app --host 0.0.0.0 --port 8000

  # Persistent worker: polls scrape_runs for queued jobs and runs the crawlers
  # (Playwright/Chromium live here, not in the api container).
  scraper:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-dirascan}:${POSTGRES_PASSWORD:-dirascan_dev}@db:5432/${POSTGRES_DB:-dirascan}
      PLAYWRIGHT_HEADLESS: ${PLAYWRIGHT_HEADLESS:-true}
      SCRAPER_REQUEST_DELAY_SECONDS: ${SCRAPER_REQUEST_DELAY_SECONDS:-2.0}
      FACEBOOK_EMAIL: ${FACEBOOK_EMAIL:-}
      FACEBOOK_PASSWORD: ${FACEBOOK_PASSWORD:-}
    env_file:
      - .env
    volumes:
      - ./scraper:/app
      - playwright_cache:/ms-playwright
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    mem_limit: 2g
    cpus: "1.5"
    # On-demand CLI still works:
    #   docker compose run --rm scraper dirascan scrape --city "תל אביב" --source yad2
    command: dirascan worker

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
    environment:
      # Inside the Docker network the API is reachable by its service name.
      VITE_API_BASE_URL: http://api:8000
      VITE_MAPBOX_TOKEN: ${VITE_MAPBOX_TOKEN:-}

volumes:
  pgdata:
  playwright_cache:
