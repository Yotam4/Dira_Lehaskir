name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  # ---------------------------------------------------------------------------
  # Scraper package: NLP + crawler offline tests + worker/queue tests.
  # Spins up PostGIS so the FOR UPDATE SKIP LOCKED queue-claim and stale-run
  # recovery tests (gated on TEST_DATABASE_URL) actually execute.
  # ---------------------------------------------------------------------------
  scraper:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: dirascan
          POSTGRES_PASSWORD: dirascan_dev
          POSTGRES_DB: dirascan
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dirascan"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://dirascan:dirascan_dev@localhost:5432/dirascan
      TEST_DATABASE_URL: postgresql://dirascan:dirascan_dev@localhost:5432/dirascan
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scraper/pyproject.toml
      - name: Install scraper (no browsers needed — offline tests mock Playwright)
        working-directory: scraper
        run: pip install -e ".[dev]"
      - name: Run migrations against PostGIS
        working-directory: scraper
        run: dirascan migrate
      - name: Run scraper tests (incl. Postgres queue tests)
        working-directory: scraper
        run: pytest tests/ -v

  # ---------------------------------------------------------------------------
  # API: routes + schemas. DB is fully mocked, so no service needed — but the
  # dirascan package must be importable, so install it (base, no Playwright
  # browsers) alongside the API.
  # ---------------------------------------------------------------------------
  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            scraper/pyproject.toml
            api/pyproject.toml
      - name: Install dirascan (base) so the API can import it
        working-directory: scraper
        run: pip install -e .
      - name: Install API + dev deps
        working-directory: api
        run: pip install -e ".[dev]"
      - name: Run API tests
        working-directory: api
        env:
          PYTHONPATH: ${{ github.workspace }}/scraper
        run: pytest tests/ -v

  # ---------------------------------------------------------------------------
  # Frontend: typecheck, unit tests, and a production build.
  # ---------------------------------------------------------------------------
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Unit tests
        run: npm test
      - name: Typecheck + production build
        run: npm run build
